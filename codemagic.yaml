workflows:
  android-apk-build:
    name: Build Android APK
    instance_type: mac_mini_m2
    max_build_duration: 30
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Build Android APK
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/**/*.apk
